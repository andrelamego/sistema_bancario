services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sistema_bancario_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: sistema_bancario_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "1433"
      DB_NAME: bd_sistema_bancario
      DB_USER: sa
      DB_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - ./sql:/sql:ro
      - ./docker/init-db.sh:/init/init-db.sh:ro
    command: ["/bin/bash", "/init/init-db.sh"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema_bancario_app
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_PORT: "1433"
      DB_NAME: bd_sistema_bancario
      DB_USER: sa
      DB_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "8080:8080"

volumes:
  sqlserver_data:
